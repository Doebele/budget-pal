# Single persistent volume for SQLite DB, uploads, and FX cache — no Postgres.
# Usage from repo root:
#   docker compose -f docker-compose.sqlite.yml --env-file .env up -d --build
#
# Set JWT_SECRET_KEY and (for first boot) AUTO_CREATE_SCHEMA=true in .env, or pass:
#   AUTO_CREATE_SCHEMA=true docker compose -f docker-compose.sqlite.yml up -d

networks:
  budget-pal-network:
    driver: bridge

volumes:
  budget-pal-app-data:
    driver: local

services:
  budget-pal-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: budget-pal-backend
    restart: unless-stopped
    networks:
      - budget-pal-network
    ports:
      - "${BACKEND_PORT:-8010}:8000"
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/budget-pal.db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      SWISS_INFLATION_RATE: ${SWISS_INFLATION_RATE:-0.015}
      AHV_MAX_PENSION_CHF: ${AHV_MAX_PENSION_CHF:-2520}
      AHV_CONVERSION_RATE_BVG: ${AHV_CONVERSION_RATE_BVG:-0.068}
      UPLOADS_DIR: /app/data/uploads
      RATES_CACHE_PATH: /app/data/cache/rates.json
      ENVIRONMENT: ${ENVIRONMENT:-production}
      AUTO_CREATE_SCHEMA: ${AUTO_CREATE_SCHEMA:-true}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8011,https://budgetpal.doebele12.de}
    volumes:
      - budget-pal-app-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  budget-pal-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: budget-pal-frontend
    restart: unless-stopped
    networks:
      - budget-pal-network
    ports:
      - "${FRONTEND_PORT:-8011}:80"
    depends_on:
      budget-pal-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
