networks:
  budget-pal-network:
    driver: bridge

volumes:
  budget-pal-postgres-data:
    driver: local
  budget-pal-uploads:
    driver: local
  budget-pal-cache:
    driver: local

services:
  budget-pal-db:
    image: postgres:15-alpine
    container_name: budget-pal-db
    restart: unless-stopped
    networks:
      - budget-pal-network
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-budgetpal}
      POSTGRES_USER: ${POSTGRES_USER:-budgetpal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - budget-pal-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-budgetpal} -d ${POSTGRES_DB:-budgetpal}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  budget-pal-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: budget-pal-backend
    restart: unless-stopped
    networks:
      - budget-pal-network
    ports:
      - "${BACKEND_PORT:-8010}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-budgetpal}:${POSTGRES_PASSWORD}@budget-pal-db:5432/${POSTGRES_DB:-budgetpal}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      SWISS_INFLATION_RATE: ${SWISS_INFLATION_RATE:-0.015}
      AHV_MAX_PENSION_CHF: ${AHV_MAX_PENSION_CHF:-2520}
      AHV_CONVERSION_RATE_BVG: ${AHV_CONVERSION_RATE_BVG:-0.068}
      UPLOADS_DIR: /app/data/uploads
      RATES_CACHE_PATH: /app/data/cache/rates.json
      ENVIRONMENT: ${ENVIRONMENT:-production}
      # Set true for a fresh DB without Alembic migrations (see .env.example).
      AUTO_CREATE_SCHEMA: ${AUTO_CREATE_SCHEMA:-false}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8011,https://budgetpal.doebele12.de}
    volumes:
      - budget-pal-uploads:/app/data/uploads
      - budget-pal-cache:/app/data/cache
    depends_on:
      budget-pal-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  budget-pal-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: budget-pal-frontend
    restart: unless-stopped
    networks:
      - budget-pal-network
    ports:
      - "${FRONTEND_PORT:-8011}:80"
    depends_on:
      budget-pal-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
